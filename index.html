<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#1D9E75;--ac-l:#E1F5EE;--ac-d:#0F6E56;--neg:#E24B4A;--bg:#fff;--bg2:#f5f5f3;--tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#999;--brd:rgba(0,0,0,0.08);--brd2:rgba(0,0,0,0.16);--r:10px;--rl:14px;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono',Menlo,Consolas,monospace}
.dark{--bg:#1a1a1a;--bg2:#252525;--tx:#e8e8e8;--tx2:#999;--tx3:#666;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.16);--ac-l:#0a3d2e;--ac-d:#5DCAA5}
body{font-family:var(--f);color:var(--tx);background:var(--bg);-webkit-tap-highlight-color:transparent;overscroll-behavior-x:none;padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
.app{max-width:480px;margin:0 auto;min-height:100dvh}
.main{padding-bottom:8px}
.onboard{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;transition:opacity .3s,transform .3s}
.onboard.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.onboard h1{font-size:28px;font-weight:600;margin-bottom:4px}
.onboard .sub{font-size:14px;color:var(--tx2);margin-bottom:24px}
.ob-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:6px}
.ob-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--rl);border:1px solid var(--brd2);cursor:pointer;transition:all .12s;background:var(--bg);font-size:15px;font-weight:500;-webkit-user-select:none}
.ob-item:active{background:var(--ac-l);border-color:var(--ac)}
.ob-accent{width:3px;height:28px;background:var(--ac);border-radius:2px;margin-bottom:20px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.hdr h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.hdr-av{width:34px;height:34px;border-radius:50%;background:var(--ac-l);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ac-d);cursor:pointer;border:2px solid var(--ac);transition:transform .1s}
.hdr-av:active{transform:scale(.93)}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.st2{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.st2 .sl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px}
.st2 .sv{font-size:20px;font-weight:600;margin-top:2px}
.st2.me{cursor:pointer}
.add-bar{margin:0 16px 10px;padding:12px 16px;border-radius:var(--rl);background:var(--ac);display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-user-select:none;transition:background .1s}
.add-bar:active{background:var(--ac-d)}
.add-bar .ab-plus{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:600}
.add-bar .ab-txt{color:#fff;font-size:14px;font-weight:600}
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--brd);background:var(--bg);padding:6px 0 calc(6px + env(safe-area-inset-bottom,0));z-index:40;max-width:480px;margin:0 auto}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--tx3);cursor:pointer;padding:4px 0;border:none;background:none;font-family:var(--f);transition:color .15s,transform .1s}
.bnav-item:active{transform:scale(.92)}
.bnav-item.on{color:var(--ac-d);font-weight:600}
.bnav-item .ni{font-size:18px;line-height:1}
.pnl{display:none;padding:0 16px;animation:none}
.pnl.on{display:block;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cpills{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:2px 0}
.cpills::-webkit-scrollbar{display:none}
.cpill{padding:5px 12px;border-radius:16px;font-size:11px;border:1px solid var(--brd);cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--tx2);font-weight:500;transition:all .1s}
.cpill.on{background:var(--ac-l);border-color:var(--ac);color:var(--ac-d);font-weight:600}
.day-lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px;padding-left:2px}
.day-lbl:first-child{margin-top:4px}
.ei{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);cursor:pointer;transition:background .1s;margin-bottom:4px;-webkit-user-select:none}
.ei:active{background:var(--bg2)}
.eic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.einfo{flex:1;min-width:0}.einfo .et{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.einfo .em{font-size:11px;color:var(--tx2);margin-top:1px}
.eamt .ev{font-size:14px;font-weight:600}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;display:none;align-items:flex-end;justify-content:center;transition:background .2s}
.mo.open{display:flex;animation:moIn .25s ease-out forwards}
.mo.open .ms{animation:sheetUp .25s ease-out}
@keyframes moIn{from{background:rgba(0,0,0,0)}to{background:rgba(0,0,0,.45)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ms{background:var(--bg);border-radius:18px 18px 0 0;padding:16px 16px calc(12px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ms::before{content:'';display:block;width:36px;height:4px;border-radius:2px;background:var(--brd2);margin:0 auto 12px}
.ms h2{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.ms h2 span{font-size:12px;color:var(--tx2);cursor:pointer;font-weight:400}
.fg{margin-bottom:8px}.fg label{display:block;font-size:10px;color:var(--tx2);margin-bottom:2px;font-weight:500}
.fg input,.fg select{width:100%;font-size:14px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd2);background:var(--bg);color:var(--tx);font-family:var(--f);outline:none}
.fg input:focus,.fg select:focus{border-color:var(--ac)}
.fg-big input{font-size:28px;font-weight:600;text-align:center;padding:14px 10px;border:none;border-bottom:2px solid var(--brd2);border-radius:0}
.fg-big input:focus{border-bottom-color:var(--ac)}
.cat-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:2px 0}.cat-row::-webkit-scrollbar{display:none}
.cc{padding:7px 14px;border-radius:16px;font-size:12px;border:1.5px solid var(--brd);cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--tx);font-weight:500;transition:all .1s;display:flex;align-items:center;gap:4px}
.cc.on{background:var(--ac);border-color:var(--ac);color:#fff}
.payer-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd2);cursor:pointer;font-size:13px;margin-bottom:8px}
.you-tag{font-size:10px;color:var(--ac-d);background:var(--ac-l);padding:2px 6px;border-radius:4px;font-weight:600}
.split-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd2);cursor:pointer;font-size:13px;margin-bottom:10px}
.split-row .sr-val{font-weight:500;color:var(--ac-d)}

/* Fullscreen add expense */
.add-ov{position:fixed;inset:0;background:var(--bg);z-index:70;display:none;flex-direction:column}
.add-ov.open{display:flex;animation:slideIn .2s ease-out}
.add-topbar{display:flex;align-items:center;padding:10px 16px;gap:8px;flex-shrink:0}
.add-topbar .atb-back{font-size:22px;color:var(--ac-d);cursor:pointer;padding:4px}
.add-topbar .atb-title{flex:1;text-align:center;font-size:16px;font-weight:600}
.add-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px 16px}
.add-sec{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.add-sec .as-label{font-size:11px;color:var(--tx2);margin-bottom:6px;font-weight:500}
.add-title-row{display:flex;align-items:center;gap:8px}
.add-title-row input{flex:1;font-size:15px;font-weight:500;border:none;background:none;color:var(--tx);outline:none;font-family:var(--f);padding:0}
.add-title-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.add-amt input{font-size:26px;font-weight:600;border:none;background:none;color:var(--tx);outline:none;font-family:var(--f);padding:0;width:100%}
.add-cat-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}.add-cat-row::-webkit-scrollbar{display:none}
.add-avatars{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:4px 0}.add-avatars::-webkit-scrollbar{display:none}
.av-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-user-select:none;flex-shrink:0}
.av-circ{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2.5px solid transparent;transition:all .12s}
.av-circ.on{border-color:var(--ac);background:var(--ac-l);color:var(--ac-d)}
.av-circ.off{background:var(--bg);color:var(--tx2)}
.av-nm{font-size:10px;color:var(--tx2);max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.av-nm.on{color:var(--ac-d);font-weight:500}
.mode-toggle{display:flex;gap:3px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:10px}
.mode-btn{flex:1;text-align:center;padding:7px 0;border-radius:8px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .12s;border:none;background:none;font-family:var(--f)}
.mode-btn.on{background:var(--ac);color:#fff}
.eq-hint{font-size:12px;color:var(--tx2);margin-top:8px;text-align:center}
.exact-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--brd)}
.exact-row:last-of-type{border-bottom:none}
.exact-name{font-size:13px;font-weight:500;flex:1}
.exact-input{width:80px;text-align:right;font-size:14px;font-weight:500;border:none;background:var(--bg);border-radius:8px;padding:7px 10px;color:var(--tx);font-family:var(--f);outline:none}
.exact-input:focus{box-shadow:0 0 0 2px var(--ac-l)}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;margin-top:6px;border-top:1px solid var(--brd2)}
.total-bar .tl{font-size:12px;color:var(--tx2)}
.total-bar .tv{font-size:13px;font-weight:600}
.total-bar .tv.ok{color:var(--ac)}
.total-bar .tv.err{color:var(--neg)}
.val-msg{font-size:11px;color:var(--neg);text-align:center;margin-top:6px}
.add-save{padding:12px;flex-shrink:0;padding-bottom:calc(12px + env(safe-area-inset-bottom,0))}
.add-save .save-btn.disabled{opacity:.4;pointer-events:none}
.save-btn{width:100%;padding:13px;border-radius:var(--r);background:var(--ac);border:none;color:#fff;font-size:14px;font-weight:600;font-family:var(--f);cursor:pointer;transition:background .1s}
.save-btn:active{background:var(--ac-d)}
.btn-row{display:flex;gap:6px;margin-top:6px}
.btn-row button{flex:1;padding:11px;border-radius:var(--r);font-size:13px;cursor:pointer;font-weight:600;font-family:var(--f)}
.btn-sec{background:var(--bg2);border:1px solid var(--brd);color:var(--tx)}
.btn-del{background:none;border:1.5px solid var(--neg);color:var(--neg);flex:0 0 auto!important;padding:11px 14px!important}
.sp-list{display:flex;flex-direction:column;gap:4px}
.sp{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);cursor:pointer;transition:all .1s;font-size:14px;font-weight:500;-webkit-user-select:none}
.sp .chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all .1s}
.sp.on{background:var(--ac-l);border-color:var(--ac)}.sp.on .chk{background:var(--ac);border-color:var(--ac);color:#fff}
.allbtn{font-size:11px;color:var(--ac-d);cursor:pointer;font-weight:600}
.bal-hero{text-align:center;padding:16px 0 20px}
.bal-hero .bh-val{font-size:32px;font-weight:600;margin-top:4px}
.bi{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--brd)}.bi:last-child{border-bottom:none}
.bav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.bn{font-size:13px;font-weight:500;min-width:55px}.bbar{flex:1;height:5px;background:var(--bg2);border-radius:3px}.bbf{height:100%;border-radius:3px;transition:width .3s}
.bv{font-size:13px;font-weight:600;min-width:65px;text-align:right}
.sec-lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px}
.si{display:flex;align-items:center;gap:6px;padding:10px 12px;border-radius:var(--r);background:var(--bg2);margin-bottom:5px;font-size:12px;font-weight:500;flex-wrap:wrap}
.si.done{opacity:.45}.si.done .sa{text-decoration:line-through}
.sarr{color:var(--ac);font-weight:600;font-size:14px}.sa{margin-left:auto;font-weight:600;font-size:13px}
.pbtn{padding:5px 10px;border-radius:8px;border:none;font-size:10px;cursor:pointer;font-family:var(--f);font-weight:600;white-space:nowrap;transition:all .1s}
.pbtn-pay{background:var(--ac);color:#fff}.pbtn-pay:active{background:var(--ac-d)}.pbtn-undo{background:var(--ac-l);color:var(--ac-d)}
.ibcopy{padding:4px 8px;border-radius:6px;background:var(--ac-l);color:var(--ac-d);border:none;font-size:10px;cursor:pointer;font-weight:600;font-family:var(--f)}.ibcopy:active{background:var(--ac);color:#fff}
.iban-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--brd);margin-bottom:4px;font-size:11px}
.iban-row .ibn{font-weight:600;min-width:50px}.iban-row .ibv{flex:1;font-family:var(--mono);font-size:10px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--brd);margin-bottom:3px;font-size:11px}
.pl-item .plc{color:var(--ac);font-size:13px;flex-shrink:0}.pl-item .pln{flex:1}.pl-item .pla{font-weight:600}
.ppl{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--brd);margin-bottom:4px}
.ppl.is-me{border-color:var(--ac);border-width:2px;background:var(--ac-l)}
.ppl .pi{flex:1;min-width:0}.ppl .pi .pn{font-size:13px;font-weight:500}.ppl .pi .pb{font-size:11px;color:var(--tx2);font-family:var(--mono)}
.me-tag{font-size:9px;font-weight:600;color:var(--ac-d);background:var(--ac-l);padding:1px 6px;border-radius:4px;margin-left:4px}
.pbtn-sm{padding:4px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);font-size:10px;cursor:pointer;color:var(--tx);font-family:var(--f);font-weight:500}
.pbtn-me{padding:4px 10px;border-radius:8px;border:1px solid var(--ac);background:var(--ac-l);font-size:10px;cursor:pointer;color:var(--ac-d);font-family:var(--f);font-weight:600}
.pbtn-me.on{background:var(--ac);color:#fff}
.ppl-add{width:100%;padding:11px;border-radius:var(--r);border:1.5px dashed var(--brd2);background:none;font-size:12px;cursor:pointer;color:var(--tx2);font-family:var(--f);font-weight:500;margin-top:6px}
.dtl{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dtl.open{display:block;animation:slideIn .2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.dbk{font-size:13px;color:var(--ac-d);cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.dr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px}.dr .dl{color:var(--tx2)}
.chart-ov{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;padding:16px;overflow-y:auto}
.chart-ov.open{display:block;animation:slideIn .2s ease-out}
.chart-person{margin-bottom:14px}.chart-name{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.chart-name .ct{font-weight:400;color:var(--tx2);font-size:12px;margin-left:auto}
.chart-bars{display:flex;height:26px;border-radius:6px;overflow:hidden;background:var(--bg2)}
.chart-bar{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;min-width:0;overflow:hidden;white-space:nowrap;transition:width .4s}.chart-bar span{padding:0 3px}
.toast{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);background:var(--ac-d);color:#fff;padding:8px 20px;border-radius:24px;font-size:13px;z-index:500;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;pointer-events:none;font-weight:500;opacity:0;max-width:90vw;text-align:center;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(16px);opacity:1}
.empty{text-align:center;padding:2rem 1rem;color:var(--tx2)}.empty p{font-size:13px;line-height:1.5}
.pos{color:#1D9E75}.neg{color:#E24B4A}
.isec{margin-top:16px;padding-top:12px;border-top:1px solid var(--brd)}.isec h3{font-size:13px;font-weight:600;margin-bottom:8px}
.share-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.share-row .sn{font-size:12px;font-weight:500;min-width:55px}
.share-row .sbar{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.share-row .sbf{height:100%;border-radius:4px;transition:width .3s}
.share-row .sv{font-size:11px;font-weight:600;min-width:40px;text-align:right}
.share-row .sp{font-size:10px;color:var(--tx2);min-width:32px;text-align:right}
.hottie-ov{position:fixed;inset:0;background:var(--bg);z-index:65;display:none;flex-direction:column}
.hottie-ov.open{display:flex;animation:slideIn .2s ease-out}
.hottie-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 80px}
.hottie-card{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:10px;position:relative}
.hottie-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hottie-photo{width:60px;height:60px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;border:1.5px dashed var(--brd2);flex-shrink:0}
.hottie-photo img{width:100%;height:100%;object-fit:cover}
.hottie-photo .hp-placeholder{font-size:10px;color:var(--tx3);text-align:center}
.hottie-name{font-size:16px;font-weight:600}
.hottie-avg{font-size:22px;font-weight:600;color:var(--ac)}
.hottie-cat{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--brd)}
.hottie-cat:last-child{border-bottom:none}
.hottie-cat .hc-label{font-size:12px;color:var(--tx2);min-width:55px}
.hottie-stars{display:flex;gap:2px}
.hottie-star{font-size:20px;cursor:pointer;color:var(--brd2);transition:color .1s;-webkit-user-select:none;padding:2px}
.hottie-star.on{color:#FAC775}
.hottie-cat .hc-avg{font-size:12px;color:var(--tx2);min-width:30px;text-align:right}
.hottie-rank{position:absolute;top:10px;right:14px;font-size:11px;font-weight:600;color:var(--ac-d);background:var(--ac-l);padding:2px 8px;border-radius:8px}
</style>

<body>
<div class="onboard" id="onboard"><div class="ob-accent"></div><h1>Conto</h1><div class="sub">Yo, wie ben jij?</div><div class="ob-list" id="ob-list"><div style="color:var(--tx2);font-size:13px;padding:20px">Laden...</div></div></div>
<div class="app" id="app" style="display:none">
<div class="hdr"><h1 id="hdr-logo">Conto</h1><div style="display:flex;align-items:center;gap:8px"><div id="theme-toggle" style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;background:var(--bg2);-webkit-user-select:none" onclick="toggleTheme()">🌙</div><div class="hdr-av" id="hdr-av" onclick="curTab='ppl';render()"></div></div></div>
<div class="main">
<div class="stats2" id="stats2"></div>
<div class="add-bar" id="add-bar"><div class="ab-plus">+</div><div class="ab-txt">Drop een uitgave</div></div>
<div class="pnl on" id="p-exp"><div class="cpills" id="cpills"></div><div id="elist"></div></div>
<div class="pnl" id="p-bal"><div class="bal-hero" id="bal-hero"></div><div id="blist"></div><div class="isec" id="spend-share"></div></div>
<div class="pnl" id="p-set"><div id="slist"></div><div class="isec"><h3>IBAN snelkopie</h3><div id="iban-list"></div></div><div class="isec" id="paylog-sec" style="display:none"><h3>Betaallog</h3><div id="paylog"></div></div></div>
<div class="pnl" id="p-ppl"><div style="font-size:12px;color:var(--tx2);margin-bottom:10px">Je squad. Duid aan wie jij bent!</div><div id="ppl-list"></div><button class="ppl-add" id="ppl-add">+ Nog een broeder erbij</button></div>
</div>

</div>

<div class="add-ov" id="add-ov"></div>
<div class="dtl" id="dtl"></div>
<div class="chart-ov" id="chart-ov"></div>
<div class="hottie-ov" id="hottie-ov"></div>
<div class="toast" id="toast"></div>
<script>
const CATS={food:{l:'Fret',i:'\u{1F35D}',c:'#D85A30',bg:'#FAECE7'},drinks:{l:'Drankie',i:'\u{1F377}',c:'#534AB7',bg:'#EEEDFE'},transport:{l:'Vroem',i:'\u{1F697}',c:'#185FA5',bg:'#E6F1FB'},accom:{l:'Slapen',i:'\u{1F3E0}',c:'#D4537E',bg:'#FBEAF0'},activities:{l:'Activiteit',i:'\u26F5',c:'#639922',bg:'#EAF3DE'},other:{l:'Random',i:'\u{1F4E6}',c:'#888780',bg:'#F1EFE8'}};
const PCOL=['#1D9E75','#534AB7','#D85A30','#185FA5','#D4537E','#639922','#BA7517','#E24B4A','#888780','#993556'];
const LSKEY='conto_me';
const fbCfg={apiKey:"AIzaSyDYS3oHdLUTLxSVaNS5RiPr1IX6nWyEWMQ",authDomain:"conto-expensedevider.firebaseapp.com",databaseURL:"https://conto-expensedevider-default-rtdb.europe-west1.firebasedatabase.app",projectId:"conto-expensedevider",storageBucket:"conto-expensedevider.firebasestorage.app",messagingSenderId:"662806118433",appId:"1:662806118433:web:3dfa7716c833fc708f2360"};
try{firebase.initializeApp(fbCfg)}catch(e){document.getElementById('ob-list').innerHTML='<div style="color:var(--neg);font-size:13px;padding:20px">Firebase init error: '+e.message+'</div>'}
const db=firebase.database(),dbP=db.ref('people'),dbE=db.ref('expenses'),dbN=db.ref('nid'),dbPay=db.ref('payments'),dbRat=db.ref('ratings'),dbPhotos=db.ref('photos');
let currentUser=null;
function saveMe(){}

// Theme
let isDark=false;
try{isDark=localStorage.getItem('conto_dark')==='true'}catch(e){}
function applyTheme(){
  if(isDark)document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  const btn=document.getElementById('theme-toggle');
  if(btn)btn.textContent=isDark?'\u2600\uFE0F':'\u{1F319}';
}
function toggleTheme(){isDark=!isDark;try{localStorage.setItem('conto_dark',isDark)}catch(e){}applyTheme()}
applyTheme();
let people=[{n:'Cédric',iban:''},{n:'Maat 2',iban:''},{n:'Maat 3',iban:''},{n:'Maat 4',iban:''},{n:'Maat 5',iban:''},{n:'Maat 6',iban:''},{n:'Maat 7',iban:''},{n:'Maat 8',iban:''}];
let expenses=[],payments=[],nid=1,fbReady=false,filt='all',curTab='exp';
let ratings={},photos={};
function saveData(){dbP.set(people);dbE.set(expenses);dbN.set(nid);dbPay.set(payments)}
function savePay(){dbPay.set(payments)}
function saveRatings(){dbRat.set(ratings)}
function savePhotos(){dbPhotos.set(photos)}
function fixArr(v){if(!v)return[];return Array.isArray(v)?v:Object.values(v)}
function fixPeople(v){if(!v)return people;const arr=Array.isArray(v)?v:Object.values(v);const f=arr.filter(p=>p&&p.n);return f.length?f:people}

// Use on() listeners with a load counter instead of once()
let _loadCount=0;
function checkReady(){_loadCount++;if(_loadCount>=6&&!fbReady){fbReady=true;initApp()}}

dbP.on('value',s=>{people=fixPeople(s.val());if(fbReady)render();else checkReady()});
dbE.on('value',s=>{expenses=fixArr(s.val());if(fbReady)render();else checkReady()});
dbN.on('value',s=>{if(s.val())nid=s.val();if(!fbReady)checkReady()});
dbPay.on('value',s=>{payments=fixArr(s.val());if(fbReady)render();else checkReady()});
dbRat.on('value',s=>{ratings=s.val()||{};if(fbReady&&document.getElementById('hottie-ov').classList.contains('open'))renderHottie();else if(!fbReady)checkReady()});
dbPhotos.on('value',s=>{photos=s.val()||{};if(fbReady&&document.getElementById('hottie-ov').classList.contains('open'))renderHottie();else if(!fbReady)checkReady()});

setTimeout(()=>{if(!fbReady){fbReady=true;initApp();console.log('Firebase timeout — using defaults')}},5000);
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function pcol(n){const i=people.findIndex(p=>p.n===n);return PCOL[(i>=0?i:0)%PCOL.length]}
function names(){return people.map(p=>p.n)}
function getMyBal(){if(!currentUser)return 0;const b=calcBal();return b[currentUser]||0}
let _tt=null;function toast(t){const e=document.getElementById('toast');if(_tt)clearTimeout(_tt);e.classList.remove('show');void e.offsetWidth;e.textContent=t;e.classList.add('show');_tt=setTimeout(()=>{e.classList.remove('show');_tt=null},2000)}
function initApp(){
  // Validate currentUser exists in people list
  if(currentUser && !people.find(p=>p.n===currentUser)){
    currentUser=null;saveMe();
  }
  if(!currentUser)showOnboard();else startApp()
}
function showOnboard(){document.getElementById('app').style.display='none';document.getElementById('onboard').classList.remove('hide');const ppl=people.filter(p=>p&&p.n);if(!ppl.length){document.getElementById('ob-list').innerHTML='<div style="color:var(--tx2);font-size:13px;padding:20px">Geen squad gevonden. Check je verbinding.</div>';return}document.getElementById('ob-list').innerHTML=ppl.map((p,i)=>`<div class="ob-item" onclick="pickMe(${i})"><div class="bav" style="background:${PCOL[i%PCOL.length]}20;color:${PCOL[i%PCOL.length]}">${ini(p.n)}</div>${p.n}</div>`).join('')}
function pickMe(i){currentUser=people[i].n;saveMe();document.getElementById('onboard').classList.add('hide');startApp();toast('Welkom '+currentUser+'!')}
function startApp(){document.getElementById('onboard').classList.add('hide');document.getElementById('app').style.display='';render()}
function render(){renderNav();renderStats();document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+curTab).classList.add('on');document.getElementById('hdr-av').textContent=currentUser?ini(currentUser):'?';if(curTab==='exp'){renderCats();renderList()}else if(curTab==='bal')renderBal();else if(curTab==='set'){renderSettle();renderIbans();renderPaylog()}else if(curTab==='ppl')renderPeople()}
function renderNav(){const tabs=[['exp','\u{1F4B0}','Uitgaven'],['bal','\u2696\uFE0F','Wie is blut'],['set','\u{1F4B8}','Time to pay'],['ppl','\u{1F465}','De squad']];document.getElementById('bnav').innerHTML=tabs.map(([k,ic,l])=>`<button class="bnav-item${curTab===k?' on':''}" data-t="${k}"><span class="ni">${ic}</span>${l}</button>`).join('');document.querySelectorAll('.bnav-item').forEach(b=>b.onclick=()=>{curTab=b.dataset.t;render()})}
function renderStats(){const tot=expenses.reduce((s,e)=>s+e.a,0);const mb=getMyBal();const mc=mb>=0?'pos':'neg';const ml=currentUser?(mb>=0?'Broers zijn jou schuldig':'Jij moet nog lappen'):'Kies wie je bent';const mv=currentUser?`${mb>=0?'+':''}\u20AC${Math.abs(Math.round(mb)).toLocaleString('nl-BE')}`:'\u2014';document.getElementById('stats2').innerHTML=`<div class="st2"><div class="sl">Totaal schade</div><div class="sv">\u20AC${Math.round(tot).toLocaleString('nl-BE')}</div></div><div class="st2 me" id="st-me"><div class="sl">${ml}</div><div class="sv ${mc}">${mv}</div></div>`;document.getElementById('st-me').onclick=()=>handleStatTap()}
let _staps=0,_stimer=null;function handleStatTap(){if(!currentUser){curTab='ppl';render();return}_staps++;if(_stimer)clearTimeout(_stimer);_stimer=setTimeout(()=>{_staps=0},800);if(_staps>=5){_staps=0;showChart()}}
function renderCats(){let h=`<div class="cpill${filt==='all'?' on':''}" data-c="all">Alles</div>`;Object.entries(CATS).forEach(([k,v])=>{if(expenses.some(e=>e.cat===k))h+=`<div class="cpill${filt===k?' on':''}" data-c="${k}">${v.i} ${v.l}</div>`});const el=document.getElementById('cpills');el.innerHTML=h;el.querySelectorAll('.cpill').forEach(c=>c.onclick=()=>{filt=c.dataset.c;render()})}
function renderList(){const f=filt==='all'?expenses:expenses.filter(e=>e.cat===filt);const el=document.getElementById('elist');if(!f.length){el.innerHTML=`<div class="empty"><p>Niks hier broer. Drop je eerste uitgave!</p></div>`;return}const sorted=[...f].sort((a,b)=>(b.dt||'').localeCompare(a.dt||''));const groups={};sorted.forEach(e=>{const d=e.dt||'?';if(!groups[d])groups[d]=[];groups[d].push(e)});const today=new Date().toISOString().slice(0,10),yest=new Date(Date.now()-864e5).toISOString().slice(0,10);let html='';Object.entries(groups).forEach(([d,items])=>{let label=d===today?'Vandaag':d===yest?'Gisteren':d;html+=`<div class="day-lbl">${label}</div>`;items.forEach(e=>{const c=CATS[e.cat]||CATS.other;const isEx=e.splitMode==='exact';html+=`<div class="ei" data-id="${e.id}"><div class="eic" style="background:${c.bg};color:${c.c}">${c.i}</div><div class="einfo"><div class="et">${e.d}</div><div class="em">${e.payer} \xB7 ${e.split.length}p${isEx?' \xB7 exact':''}</div></div><div class="eamt"><div class="ev">\u20AC${e.a.toFixed(2)}</div></div></div>`})});el.innerHTML=html;el.querySelectorAll('.ei').forEach(i=>i.onclick=()=>showDtl(+i.dataset.id))}
function calcBal(){const b={};names().forEach(n=>b[n]=0);expenses.forEach(e=>{b[e.payer]=(b[e.payer]||0)+e.a;if(e.splitMode==='exact'&&e.splitAmounts){Object.entries(e.splitAmounts).forEach(([p,v])=>{if(b[p]!==undefined)b[p]-=(parseFloat(v)||0)})}else{const sh=e.a/e.split.length;e.split.forEach(p=>{if(b[p]!==undefined)b[p]-=sh})}});payments.forEach(pm=>{if(b[pm.f]!==undefined)b[pm.f]+=pm.a;if(b[pm.t]!==undefined)b[pm.t]-=pm.a});return b}
function renderBal(){const b=calcBal();const mb=currentUser?(b[currentUser]||0):0;const mc=mb>=0?'pos':'neg';document.getElementById('bal-hero').innerHTML=currentUser?`<div style="font-size:12px;color:var(--tx2)">${mb>=0?'Broers zijn jou schuldig':'Jij moet nog lappen'}</div><div class="bh-val ${mc}">${mb>=0?'+':''}\u20AC${Math.abs(mb).toFixed(2)}</div>`:`<div style="font-size:12px;color:var(--tx2)">Kies wie je bent bij De squad</div>`;const mx=Math.max(...Object.values(b).map(Math.abs),1);document.getElementById('blist').innerHTML=names().map(n=>{const v=b[n]||0;const cls=v>=0?'pos':'neg';const pct=Math.abs(v)/mx*100;const bc=v>=0?'#1D9E75':'#E24B4A';return`<div class="bi"><div class="bav" style="background:${pcol(n)}20;color:${pcol(n)}">${ini(n)}</div><div class="bn">${n}</div><div class="bbar"><div class="bbf" style="width:${pct}%;background:${bc}"></div></div><div class="bv ${cls}">${v>=0?'+':''}\u20AC${Math.abs(v).toFixed(2)}</div></div>`}).join('');renderSpendShare()}
function renderSpendShare(){const el=document.getElementById('spend-share');const tot=expenses.reduce((s,e)=>s+e.a,0);if(tot<0.01){el.innerHTML='';return}const spent={};names().forEach(n=>spent[n]=0);expenses.forEach(e=>spent[e.payer]=(spent[e.payer]||0)+e.a);const sorted=names().map(n=>({n,a:spent[n]||0,pct:((spent[n]||0)/tot*100)})).sort((a,b)=>b.a-a.a);el.innerHTML=`<h3>Wie heeft het meest gelapt?</h3>`+sorted.map((s,i)=>`<div class="share-row"><div class="bav" style="background:${pcol(s.n)}20;color:${pcol(s.n)};width:22px;height:22px;font-size:9px">${ini(s.n)}</div><div class="sn">${s.n}</div><div class="sbar"><div class="sbf" style="width:${s.pct}%;background:${pcol(s.n)}"></div></div><div class="sv">\u20AC${Math.round(s.a)}</div><div class="sp">${Math.round(s.pct)}%</div></div>`).join('')}
function renderSettle(){const b=calcBal();const dbt=names().filter(n=>b[n]<-0.01).map(n=>({n,a:b[n]})).sort((a,c)=>a.a-c.a);const crd=names().filter(n=>b[n]>0.01).map(n=>({n,a:b[n]})).sort((a,c)=>c.a-a.a);const stl=[];let di=0,ci=0;while(di<dbt.length&&ci<crd.length){const am=Math.min(-dbt[di].a,crd[ci].a);if(am>0.01)stl.push({f:dbt[di].n,t:crd[ci].n,a:am});dbt[di].a+=am;crd[ci].a-=am;if(Math.abs(dbt[di].a)<0.01)di++;if(Math.abs(crd[ci].a)<0.01)ci++}const el=document.getElementById('slist');let html='';if(stl.length){html+=`<div class="sec-lbl">Openstaand</div>`;html+=stl.map(s=>{const ef=s.f.replace(/'/g,"\\'"),et=s.t.replace(/'/g,"\\'");return`<div class="si"><div class="bav" style="background:${pcol(s.f)}20;color:${pcol(s.f)};width:24px;height:24px;font-size:9px">${ini(s.f)}</div><span>${s.f}</span><span class="sarr">\u2192</span><span>${s.t}</span><div class="bav" style="background:${pcol(s.t)}20;color:${pcol(s.t)};width:24px;height:24px;font-size:9px">${ini(s.t)}</div><span class="sa">\u20AC${s.a.toFixed(2)}</span><button class="pbtn pbtn-pay" onclick="event.stopPropagation();markPaid('${ef}','${et}',${s.a})">Betaal</button></div>`}).join('')}if(payments.length){html+=`<div class="sec-lbl">Afgehandeld</div>`;html+=payments.map((pm,i)=>`<div class="si done"><div class="bav" style="background:${pcol(pm.f)}20;color:${pcol(pm.f)};width:24px;height:24px;font-size:9px">${ini(pm.f)}</div><span>${pm.f}</span><span class="sarr">\u2192</span><span>${pm.t}</span><div class="bav" style="background:${pcol(pm.t)}20;color:${pcol(pm.t)};width:24px;height:24px;font-size:9px">${ini(pm.t)}</div><span class="sa">\u20AC${pm.a.toFixed(2)}</span><button class="pbtn pbtn-undo" onclick="event.stopPropagation();undoPay(${i})">Undo</button></div>`).join('')}if(!stl.length&&!payments.length)html=`<div class="empty"><p>Iedereen is clean, wallah!</p></div>`;else if(!stl.length)html=`<div class="empty"><p>Alles betaald, nice!</p></div>`+html;el.innerHTML=html}
function markPaid(f,t,a){payments.push({f,t,a:Math.round(a*100)/100,dt:new Date().toISOString().slice(0,10)});savePay();render();toast(f+' \u2192 '+t+' betaald!')}
function undoPay(i){payments.splice(i,1);savePay();render();toast('Teruggedraaid!')}
function renderIbans(){const el=document.getElementById('iban-list');const w=people.filter(p=>p.iban);if(!w.length){el.innerHTML=`<div style="font-size:11px;color:var(--tx2)">Nog geen IBAN's. Fix bij De squad.</div>`;return}el.innerHTML=w.map(p=>`<div class="iban-row"><div class="bav" style="background:${pcol(p.n)}20;color:${pcol(p.n)};width:22px;height:22px;font-size:9px">${ini(p.n)}</div><span class="ibn">${p.n}</span><span class="ibv">${p.iban}</span><button class="ibcopy" onclick="copyIban('${p.n.replace(/'/g,"\\'")}')">Kopieer</button></div>`).join('')}
function renderPaylog(){const sec=document.getElementById('paylog-sec'),el=document.getElementById('paylog');if(!payments.length){sec.style.display='none';return}sec.style.display='';el.innerHTML=[...payments].reverse().map(pm=>`<div class="pl-item"><span class="plc">\u2713</span><span class="pln">${pm.f} \u2192 ${pm.t}</span><span class="pla">\u20AC${pm.a.toFixed(2)}</span><span style="font-size:10px;color:var(--tx3)">${pm.dt||''}</span></div>`).join('')}
function copyIban(name){const p=people.find(x=>x.n===name);if(!p||!p.iban)return;if(navigator.clipboard)navigator.clipboard.writeText(p.iban).then(()=>toast('IBAN geknipt!')).catch(fb);else fb();function fb(){const t=document.createElement('textarea');t.value=p.iban;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('IBAN geknipt!')}}
function renderPeople(){document.getElementById('ppl-list').innerHTML=people.map((p,i)=>{const me=currentUser===p.n;return`<div class="ppl${me?' is-me':''}"><div class="bav" style="background:${PCOL[i%PCOL.length]}20;color:${PCOL[i%PCOL.length]}">${ini(p.n)}</div><div class="pi"><div class="pn">${p.n}${me?'<span class="me-tag">jij</span>':''}</div><div class="pb">${p.iban||'Geen IBAN'}</div></div><button class="pbtn-me${me?' on':''}" onclick="setMe(${i})">${me?'Jij!':'Dit ben ik'}</button><button class="pbtn-sm" onclick="editPerson(${i})">Fix</button></div>`}).join('')}
function setMe(i){const n=people[i].n;currentUser=(currentUser===n)?null:n;saveMe();render();toast(currentUser?'Hey '+currentUser+'!':'Niemand geselecteerd')}
function closeMo(){document.getElementById('mo').classList.remove('open')}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeMo()});
function editPerson(i){const p=people[i],ms=document.getElementById('ms');ms.innerHTML=`<h2>Broeder fixen<span onclick="closeMo()">Laat maar</span></h2><div class="fg"><label>Naam</label><input id="ep-n" value="${p.n}"></div><div class="fg"><label>IBAN</label><input id="ep-ib" value="${p.iban}" placeholder="BE00 0000 0000 0000" style="font-family:var(--mono)"></div><div class="btn-row"><button class="btn-sec" onclick="closeMo()">Nee toch</button><button class="save-btn" onclick="savePerson(${i})">Save</button></div>`;document.getElementById('mo').classList.add('open')}

    payer:ex?ex.payer:(currentUser||names()[0]),

function updateExactTotal(){
  const s=window._as;

  if(tb)tb.innerHTML=`<span class="tl">Totaal ingevuld</span><span class="tv ${ok?'ok':'err'}">\u20AC${filled.toFixed(2)} / \u20AC${totalAmt.toFixed(2)}${ok?' \u2713':''}</span>`;
  const vm=document.querySelector('.val-msg');
  if(vm){if(!ok&&totalAmt>0)vm.innerHTML=diff>0?'Nog \u20AC'+diff.toFixed(2)+' te verdelen':'\u20AC'+Math.abs(diff).toFixed(2)+' teveel!';else vm.innerHTML=''}
  const btn=document.querySelector('.add-save .save-btn');
  if(btn){if(ok||s.mode==='equal')btn.classList.remove('disabled');else btn.classList.add('disabled')}
}
function saveExp(){
  const s=window._as;
  const d=document.getElementById('ai-d').value.trim();
  const a=parseFloat(document.getElementById('ai-a').value);
  if(!d||isNaN(a)||a<=0){toast('Vul wat in broer!');return}
  s.d=d;s.a=a;
  if(s.mode==='equal'){
    if(!s.split.length){toast('Kies minstens 1 broeder!');return}
  } else {
    const filled=Object.values(s.amounts).reduce((sum,v)=>sum+(parseFloat(v)||0),0);
    if(Math.abs(a-filled)>=0.01){toast('Bedragen kloppen niet!');return}
    s.split=names().filter(n=>parseFloat(s.amounts[n])>0);
  }
  if(s.isEdit){
    const e=expenses.find(x=>x.id===s.eid);
    e.d=s.d;e.a=s.a;e.cat=s.cat;e.payer=s.payer;e.split=s.split;
    e.splitMode=s.mode;e.splitAmounts=s.mode==='exact'?{...s.amounts}:null;
  } else {
    expenses.push({id:nid++,d:s.d,a:s.a,cat:s.cat,payer:s.payer,split:s.split,
      splitMode:s.mode,splitAmounts:s.mode==='exact'?{...s.amounts}:null,
      dt:new Date().toISOString().slice(0,10)});
  }
  closeAdd();saveData();render();toast(s.isEdit?'Updated swa!':'Erin gedropt!')
}

function fireConfetti(){const cv=document.createElement('canvas');cv.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:999;pointer-events:none';cv.width=window.innerWidth;cv.height=window.innerHeight;document.body.appendChild(cv);const ctx=cv.getContext('2d'),cols=['#1D9E75','#534AB7','#D85A30','#185FA5','#D4537E','#639922','#BA7517','#E24B4A','#FAC775','#5DCAA5'],pcs=[];for(let i=0;i<120;i++){const sd=Math.random()<.5?0:1;pcs.push({x:sd?cv.width+10:-10,y:cv.height*.3+Math.random()*cv.height*.2,vx:(sd?-1:1)*(4+Math.random()*8),vy:-(6+Math.random()*10),g:.25+Math.random()*.15,w:6+Math.random()*6,h:4+Math.random()*4,r:Math.random()*360,rv:(Math.random()-.5)*12,c:cols[Math.floor(Math.random()*cols.length)],a:1,dl:Math.random()*300})}const st=performance.now();function fr(now){ctx.clearRect(0,0,cv.width,cv.height);const el=now-st;let alive=false;pcs.forEach(p=>{if(el<p.dl){alive=true;return}p.x+=p.vx;p.vy+=p.g;p.y+=p.vy;p.r+=p.rv;p.vx*=.99;if(el-p.dl>1500)p.a=Math.max(0,p.a-.03);if(p.a<=0)return;alive=true;ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});if(alive)requestAnimationFrame(fr);else cv.remove()}requestAnimationFrame(fr)}

// Hottie Ranker easter egg — 5 taps on Conto logo
const HCATS=['Hoofd','Borsten','Billen','Style'];
const HOTTIES=['Hottie 1','Hottie 2','Hottie 3'];
let _htaps=0,_htimer=null;
document.getElementById('hdr-logo').onclick=()=>{
  _htaps++;if(_htimer)clearTimeout(_htimer);
  _htimer=setTimeout(()=>{_htaps=0},800);
  if(_htaps>=5){_htaps=0;showHottie()}
};
function showHottie(){
  if(!currentUser){toast('Kies eerst wie je bent!');return}
  renderHottie();
  document.getElementById('hottie-ov').classList.add('open');
  fireConfetti();
}
function closeHottie(){document.getElementById('hottie-ov').classList.remove('open')}
function getHottieAvg(hIdx){
  let total=0,cnt=0;
  Object.entries(ratings).forEach(([rater,data])=>{
    if(!data||!data[hIdx])return;
    HCATS.forEach(c=>{if(data[hIdx][c]){total+=data[hIdx][c];cnt++}})
  });
  return cnt>0?total/cnt:0;
}
function getCatAvg(hIdx,cat){
  let sum=0,cnt=0;
  Object.entries(ratings).forEach(([rater,data])=>{
    if(!data||!data[hIdx]||!data[hIdx][cat])return;
    sum+=data[hIdx][cat];cnt++;
  });
  return cnt>0?sum/cnt:0;
}
function renderHottie(){
  const ov=document.getElementById('hottie-ov');
  // Sort hotties by avg
  const sorted=HOTTIES.map((h,i)=>({name:h,idx:i,avg:getHottieAvg(i)})).sort((a,b)=>b.avg-a.avg);
  // Get all raters who have given any score
  const allRaters=new Set();
  Object.keys(ratings).forEach(r=>{
    HOTTIES.forEach((h,i)=>{if(ratings[r]&&ratings[r][i])allRaters.add(r)})
  });
  const raterList=[...allRaters];

  const cards=sorted.map((h,rank)=>{
    const photo=photos[h.idx];
    const myScores=(ratings[currentUser]&&ratings[currentUser][h.idx])||{};
    const photoHtml=photo?`<img src="${photo}" alt="">`:`<div class="hp-placeholder">+ Foto</div>`;
    const avgDisplay=h.avg>0?h.avg.toFixed(1):'\u2014';

    const catsHtml=HCATS.map(cat=>{
      const myScore=myScores[cat]||0;
      const catAvg=getCatAvg(h.idx,cat);
      const catAvgTxt=catAvg>0?catAvg.toFixed(1):'\u2014';
      const stars=[1,2,3,4,5].map(s=>`<span class="hottie-star${myScore>=s?' on':''}" data-h="${h.idx}" data-c="${cat}" data-s="${s}">\u2605</span>`).join('');
      // Other raters' scores
      const othersHtml=raterList.filter(r=>r!==currentUser).map(r=>{
        const sc=(ratings[r]&&ratings[r][h.idx]&&ratings[r][h.idx][cat])||0;
        return sc>0?`<span style="font-size:10px;color:var(--tx3);margin-left:4px">${r.split(' ')[0]}: ${sc}\u2605</span>`:'';
      }).filter(x=>x).join('');
      return`<div class="hottie-cat"><span class="hc-label">${cat}</span><div class="hottie-stars">${stars}</div>${othersHtml}<span class="hc-avg">${catAvgTxt}</span></div>`;
    }).join('');

    return`<div class="hottie-card"><div class="hottie-rank">#${rank+1}</div><div class="hottie-top"><div class="hottie-photo" data-upload="${h.idx}">${photoHtml}</div><div><div class="hottie-name">${h.name}</div><div class="hottie-avg">${avgDisplay}</div></div></div>${catsHtml}</div>`;
  }).join('');

  ov.innerHTML=`<div class="add-topbar"><div class="atb-back" onclick="closeHottie()">\u2190</div><div class="atb-title">Hottie Ranker \u{1F525}</div><div style="width:28px"></div></div><div class="hottie-body">${cards}</div>`;

  // Star click delegation
  ov.querySelectorAll('.hottie-star').forEach(star=>{
    star.onclick=(e)=>{
      e.stopPropagation();
      const hIdx=parseInt(star.dataset.h),cat=star.dataset.c,score=parseInt(star.dataset.s);
      if(!ratings[currentUser])ratings[currentUser]={};
      if(!ratings[currentUser][hIdx])ratings[currentUser][hIdx]={};
      ratings[currentUser][hIdx][cat]=score;
      saveRatings();
      renderHottie();
    }
  });
  // Photo upload delegation
  ov.querySelectorAll('.hottie-photo').forEach(ph=>{
    ph.onclick=()=>uploadHottiePhoto(parseInt(ph.dataset.upload));
  });
}
function uploadHottiePhoto(idx){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=()=>{
    const file=inp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        const maxW=240,maxH=300;
        if(w>maxW){h=h*(maxW/w);w=maxW}
        if(h>maxH){w=w*(maxH/h);h=maxH}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        photos[idx]=canvas.toDataURL('image/jpeg',0.5);
        savePhotos();
        renderHottie();
        toast('Foto opgeslagen!');
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
</script>
