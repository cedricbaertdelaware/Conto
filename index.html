<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1D9E75">
<title>Conto - Gun me barkie niffau</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ac:#1D9E75;--ac-l:#E1F5EE;--ac-d:#0F6E56;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#999;
  --brd:rgba(0,0,0,0.1);--brd2:rgba(0,0,0,0.18);
  --radius:10px;--radius-lg:14px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#252525;--bg3:#2f2f2f;
    --tx:#e8e8e8;--tx2:#999;--tx3:#666;
    --brd:rgba(255,255,255,0.1);--brd2:rgba(255,255,255,0.18);
    --ac-l:#0a3d2e;--ac-d:#5DCAA5;
  }
}
body{font-family:var(--font);color:var(--tx);background:var(--bg);-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;position:relative;min-height:100dvh;padding-bottom:2rem}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:0.75rem 0.75rem 0.5rem}
.hdr .bar{width:3px;height:24px;background:var(--ac);border-radius:2px;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600;letter-spacing:-0.4px}
.hdr p{font-size:11px;color:var(--tx2)}
.hdr-text{display:flex;flex-direction:column}

/* Add button strip */
.add-strip{margin:0 0.75rem 0.5rem;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-lg);background:var(--ac);cursor:pointer;transition:background .12s;-webkit-user-select:none;position:relative;overflow:hidden}
.add-strip:active{background:var(--ac-d)}
.add-strip .plus{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:600;flex-shrink:0}
.add-strip .atxt{color:#fff;font-size:15px;font-weight:600}
.add-strip .asub{color:rgba(255,255,255,0.7);font-size:11px;margin-top:1px}

/* Navigation */
.nav{display:flex;padding:0 0.75rem;gap:2px;margin-bottom:0.5rem}
.nav-btn{flex:1;text-align:center;padding:9px 0;font-size:12px;font-weight:400;color:var(--tx2);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;transition:all .15s;font-family:var(--font)}
.nav-btn.on{color:var(--ac-d);font-weight:600;border-bottom-color:var(--ac)}

/* Panels */
.pnl{display:none;padding:0 0.75rem}
.pnl.on{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:0.75rem}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.stat .sl{font-size:10px;color:var(--tx2);letter-spacing:0.5px;text-transform:uppercase}
.stat .sv{font-size:17px;font-weight:600;margin-top:2px}

/* Category filter */
.cats{display:flex;gap:5px;margin-bottom:0.75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0}
.cats::-webkit-scrollbar{display:none}
.cp{padding:5px 11px;border-radius:16px;font-size:11px;border:1px solid var(--brd);cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--tx2);transition:all .12s;font-weight:500}
.cp.on{background:var(--ac-l);border-color:var(--ac);color:var(--ac-d);font-weight:600}

/* Expense list */
.elist{display:flex;flex-direction:column;gap:5px}
.ei{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--radius);border:1px solid var(--brd);cursor:pointer;transition:background .12s;-webkit-user-select:none}
.ei:active{background:var(--bg2)}
.eicon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.einfo .et{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.einfo .em{font-size:11px;color:var(--tx2);margin-top:1px}
.ea{text-align:right}
.ea .ev{font-size:15px;font-weight:600}
.ea .ep{font-size:10px;color:var(--tx2);margin-top:1px}
.rb{display:inline-flex;align-items:center;font-size:10px;color:var(--ac-d);background:var(--ac-l);padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:500}

/* Modal / bottom sheet */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.ms{background:var(--bg);border-radius:18px 18px 0 0;padding:1rem 1rem 0.75rem;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ms h2{font-size:15px;font-weight:600;margin-bottom:0.6rem;display:flex;justify-content:space-between;align-items:center}
.ms h2 span{font-size:12px;color:var(--tx2);cursor:pointer;font-weight:400}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:10px;color:var(--tx2);margin-bottom:2px;font-weight:500}
.fg input,.fg select{width:100%;font-size:14px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--brd2);background:var(--bg);color:var(--tx);font-family:var(--font);outline:none;transition:border .15s}
.fg input:focus,.fg select:focus{border-color:var(--ac)}
.fg input[type=file]{font-size:11px;padding:4px 0;border:none}
.fg input[type=number]{font-variant-numeric:tabular-nums}
.fg-row{display:flex;gap:8px}
.fg-row .fg{flex:1;margin-bottom:8px}

/* Category grid in modal */
.qcat{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.qc{padding:6px 2px;border-radius:var(--radius);border:1.5px solid var(--brd);cursor:pointer;text-align:center;font-size:9px;transition:all .12s;background:var(--bg);color:var(--tx);font-weight:500}
.qc.on{background:var(--ac)!important;border-color:var(--ac)!important;border-width:2px!important;color:#fff}
.qc i{font-size:16px;display:block;margin-bottom:1px;font-style:normal}

/* Split chips */
.splitrow{display:flex;flex-direction:column;gap:4px}
.sp{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--brd);cursor:pointer;transition:all .1s;background:var(--bg);color:var(--tx);font-weight:500;font-size:14px;-webkit-user-select:none}
.sp .sp-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s;font-size:13px;color:transparent}
.sp.on{background:var(--ac-l);border-color:var(--ac)}
.sp.on .sp-check{background:var(--ac);border-color:var(--ac);color:#fff}
.allbtn{font-size:11px;color:var(--ac-d);cursor:pointer;margin-left:6px;font-weight:600}

/* Step indicator */
.steps{display:flex;gap:4px;margin-bottom:0.6rem}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--brd)}
.step-dot.on{background:var(--ac)}

/* Modal actions */
.macts{display:flex;gap:6px;margin-top:0.6rem;padding-bottom:env(safe-area-inset-bottom,0)}
.macts button{flex:1;padding:10px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:600;font-family:var(--font);transition:all .1s}
.mbtn-c{background:var(--bg2);border:1px solid var(--brd);color:var(--tx)}
.mbtn-s{background:var(--ac);border:none;color:#fff}
.mbtn-s:active{background:var(--ac-d)}
.mbtn-del{flex:0 0 auto!important;padding:10px 14px!important;color:#E24B4A!important;border-color:#E24B4A!important;background:transparent!important}

/* Balance items */
.bi{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--brd);margin-bottom:5px}
.bav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.bn{font-size:13px;font-weight:500;min-width:55px}
.bbar{flex:1;height:6px;background:var(--bg2);border-radius:3px}
.bbf{height:100%;border-radius:3px;transition:width .35s}
.bv{font-size:13px;font-weight:600;min-width:70px;text-align:right}
.pos{color:#1D9E75}.neg{color:#E24B4A}

/* Settlement items */
.si{display:flex;align-items:center;gap:6px;padding:11px 12px;border-radius:var(--radius);background:var(--bg2);margin-bottom:5px;font-size:12px;font-weight:500;flex-wrap:wrap}
.si.paid-row{opacity:0.5}
.si.paid-row .samt{text-decoration:line-through}
.sarr{color:var(--ac);font-weight:600;font-size:14px}
.samt{margin-left:auto;font-weight:600;font-size:14px}
.pay-btn{padding:4px 10px;border-radius:8px;border:1px solid var(--ac);background:var(--ac-l);font-size:10px;cursor:pointer;color:var(--ac-d);font-family:var(--font);font-weight:600;transition:all .1s;white-space:nowrap}
.pay-btn:active{background:var(--ac);color:#fff}
.pay-btn.done{background:var(--ac);color:#fff;border-color:var(--ac)}

/* IBAN */
.iban-section{margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--brd)}
.iban-section h3{font-size:14px;font-weight:600;margin-bottom:10px}
.iban-row{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--brd);margin-bottom:5px;font-size:12px}
.iban-row .ibname{font-weight:600;min-width:55px;font-size:12px}
.iban-row .ibnum{flex:1;font-family:var(--mono);font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ibcopy{padding:5px 10px;border-radius:8px;background:var(--ac-l);color:var(--ac-d);border:none;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600;font-family:var(--font);transition:all .1s}
.ibcopy:active{background:var(--ac);color:#fff}

/* Payment log */
.pl-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--brd);margin-bottom:4px;font-size:11px}
.pl-item .pl-names{flex:1;min-width:0}
.pl-item .pl-amt{font-weight:600;font-size:12px;white-space:nowrap}
.pl-item .pl-date{font-size:10px;color:var(--tx2);white-space:nowrap}
.pl-check{color:var(--ac);font-size:14px;flex-shrink:0}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ac-d);color:#fff;padding:8px 20px;border-radius:24px;font-size:13px;z-index:200;transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;font-weight:500;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Detail overlay */
.dtl{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:50;display:none;padding:1rem;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dtl.open{display:block}
.dbk{font-size:13px;color:var(--ac-d);cursor:pointer;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.dh h3{font-size:18px;font-weight:600}
.dr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px}
.dr .dl{color:var(--tx2)}

/* Empty state */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx2)}
.empty p{font-size:13px;line-height:1.5}

/* People list */
.ppl-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--brd);margin-bottom:5px}
.ppl-card.is-me{border-color:var(--ac);border-width:2px;background:var(--ac-l)}
.ppl-card .pinfo{flex:1;min-width:0}
.ppl-card .pname{font-size:13px;font-weight:500}
.ppl-card .piban{font-size:11px;color:var(--tx2);font-family:var(--mono)}
.ppl-edit{padding:5px 10px;border-radius:8px;border:1px solid var(--brd);background:var(--bg);font-size:11px;cursor:pointer;color:var(--tx);font-family:var(--font);font-weight:500}
.me-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--ac);background:var(--ac-l);font-size:11px;cursor:pointer;color:var(--ac-d);font-family:var(--font);font-weight:600}
.me-btn.active{background:var(--ac);color:#fff}
.me-tag{display:inline-block;font-size:9px;font-weight:600;color:var(--ac-d);background:var(--ac-l);padding:1px 6px;border-radius:4px;margin-left:4px}
.ppl-add{width:100%;padding:12px;border-radius:var(--radius);border:1.5px dashed var(--brd2);background:none;font-size:12px;cursor:pointer;color:var(--tx2);font-family:var(--font);font-weight:500;margin-top:0.5rem}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="app" id="app">
  <div class="hdr">
    <div class="bar"></div>
    <div class="hdr-text"><h1>Conto</h1><p>Gun me barkie niffau</p></div>
  </div>

  <div class="add-strip" id="add-strip" role="button" tabindex="0">
    <div class="plus">+</div>
    <div>
      <div class="atxt">Drop een uitgave</div>
      <div class="asub">Tik hier broer</div>
    </div>
  </div>

  <div class="nav" id="nav"></div>

  <div class="pnl on" id="p-exp">
    <div class="stats" id="stats"></div>
    <div class="cats" id="cats"></div>
    <div class="elist" id="elist"></div>
  </div>

  <div class="pnl" id="p-bal">
    <div id="blist"></div>
  </div>

  <div class="pnl" id="p-set">
    <p style="font-size:12px;color:var(--tx2);margin-bottom:0.75rem">Zo maak je het schoon, geen drama</p>
    <div id="slist"></div>
    <div class="iban-section">
      <h3>Bankgegevens voor de transfer</h3>
      <div id="iban-list"></div>
    </div>
    <div class="iban-section" id="paylog-section" style="display:none">
      <h3>Betaallog</h3>
      <div id="paylog"></div>
    </div>
  </div>

  <div class="pnl" id="p-ppl">
    <p style="font-size:12px;color:var(--tx2);margin-bottom:0.75rem">Je squad en hun bankrekening. Duid aan wie jij bent!</p>
    <div id="ppl-list"></div>
    <button class="ppl-add" id="ppl-add">+ Nog een broeder erbij</button>
  </div>
</div>

<div class="mo" id="mo">
  <div class="ms" id="ms"></div>
</div>

<div class="dtl" id="dtl"></div>
<div class="toast" id="toast"></div>

<script>
// ── Data ──
const CATS = {
  food:       { l:'Fret',        i:'\u{1F35D}', c:'#D85A30', bg:'#FAECE7' },
  drinks:     { l:'Drankie',     i:'\u{1F377}', c:'#534AB7', bg:'#EEEDFE' },
  transport:  { l:'Vroem',       i:'\u{1F697}', c:'#185FA5', bg:'#E6F1FB' },
  accom:      { l:'Slapen',      i:'\u{1F3E0}', c:'#D4537E', bg:'#FBEAF0' },
  activities: { l:'Activiteit',  i:'\u26F5',     c:'#639922', bg:'#EAF3DE' },
  other:      { l:'Random',      i:'\u{1F4E6}', c:'#888780', bg:'#F1EFE8' }
};
const PCOL = ['#1D9E75','#534AB7','#D85A30','#185FA5','#D4537E','#639922','#BA7517','#E24B4A','#888780','#993556'];

const STORAGE_KEY = 'conto_me';

// ═══════════════════════════════════════════════
// FIREBASE CONFIG — Vul hier je eigen config in!
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDYS3oHdLUTLxSVaNS5RiPr1IX6nWyEWMQ",
  authDomain: "conto-expensedevider.firebaseapp.com",
  databaseURL: "https://conto-expensedevider-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "conto-expensedevider",
  storageBucket: "conto-expensedevider.firebasestorage.app",
  messagingSenderId: "662806118433",
  appId: "1:662806118433:web:3dfa7716c833fc708f2360"
};
// ═══════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbPeople = db.ref('people');
const dbExpenses = db.ref('expenses');
const dbNid = db.ref('nid');
const dbPayments = db.ref('payments');

// currentUser is local per device
let currentUser = null;
try { currentUser = localStorage.getItem(STORAGE_KEY) || null; } catch(e) {}
function saveMe() { try { localStorage.setItem(STORAGE_KEY, currentUser || ''); } catch(e) {} }

// Shared state
let people = [
  {n:'Cédric',iban:''},{n:'Maat 2',iban:''},{n:'Maat 3',iban:''},{n:'Maat 4',iban:''},
  {n:'Maat 5',iban:''},{n:'Maat 6',iban:''},{n:'Maat 7',iban:''},{n:'Maat 8',iban:''}
];
let expenses = [];
let payments = [];
let nid = 1;
let fbReady = false;

function saveData() {
  dbPeople.set(people);
  dbExpenses.set(expenses);
  dbNid.set(nid);
  dbPayments.set(payments);
}
function savePayments() {
  dbPayments.set(payments);
}

// Listen for real-time changes
dbPeople.on('value', snap => {
  if (snap.val()) people = snap.val();
  if (fbReady) render();
});
dbExpenses.on('value', snap => {
  expenses = snap.val() ? Object.values(snap.val()).length ? snap.val() : [] : [];
  if (Array.isArray(expenses)) { /* ok */ } else { expenses = Object.values(expenses); }
  if (fbReady) render();
});
dbNid.on('value', snap => {
  if (snap.val()) nid = snap.val();
});
dbPayments.on('value', snap => {
  payments = snap.val() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
  if (fbReady) render();
});

// Initial load
db.ref().once('value', snap => {
  const d = snap.val();
  if (d) {
    if (d.people) people = d.people;
    if (d.expenses) {
      expenses = Array.isArray(d.expenses) ? d.expenses : Object.values(d.expenses);
    }
    if (d.nid) nid = d.nid;
    if (d.payments) {
      payments = Array.isArray(d.payments) ? d.payments : Object.values(d.payments);
    }
  }
  fbReady = true;
  render();
});
let filt = 'all', editId = null, curTab = 'exp';

// ── Helpers ──
function ini(n) { return n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2); }
function pcol(n) { const i = people.findIndex(p => p.n === n); return PCOL[(i >= 0 ? i : 0) % PCOL.length]; }
function names() { return people.map(p => p.n); }

let _toastTimer = null;
function toast(t) {
  const e = document.getElementById('toast');
  if (_toastTimer) clearTimeout(_toastTimer);
  e.classList.remove('show');
  void e.offsetWidth;
  e.textContent = t;
  e.classList.add('show');
  _toastTimer = setTimeout(() => { e.classList.remove('show'); _toastTimer = null; }, 2000);
}

// ── Render ──
function renderNav() {
  const tabs = [['exp','Uitgaven'],['bal','Wie is blut'],['set','Time to pay'],['ppl','De squad']];
  document.getElementById('nav').innerHTML = tabs.map(([k,l]) =>
    `<button class="nav-btn${curTab===k?' on':''}" data-t="${k}">${l}</button>`
  ).join('');
  document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => { curTab = b.dataset.t; render(); });
}

function render() {
  renderNav();
  document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));
  document.getElementById('p-' + curTab).classList.add('on');
  if (curTab === 'exp') { renderStats(); renderCats(); renderList(); }
  else if (curTab === 'bal') renderBal();
  else if (curTab === 'set') { renderSettle(); renderIbans(); renderPaylog(); }
  else if (curTab === 'ppl') renderPeople();
}

function renderStats() {
  const tot = expenses.reduce((s,e) => s + e.a, 0);
  let myOwed = 0;
  if (currentUser) {
    expenses.forEach(e => {
      if (e.split.includes(currentUser)) myOwed += e.a / e.split.length;
    });
  }
  const myVal = currentUser ? `\u20AC${Math.round(myOwed).toLocaleString('nl-BE')}` : '\u2014';
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="sl">Totaal</div><div class="sv">\u20AC${Math.round(tot).toLocaleString('nl-BE')}</div></div>` +
    `<div class="stat"><div class="sl">Uitgaven</div><div class="sv">${expenses.length}</div></div>` +
    `<div class="stat" onclick="if(!currentUser){curTab='ppl';render()}" style="${currentUser?'':'cursor:pointer'}"><div class="sl">Mijn deel</div><div class="sv">${myVal}</div>${currentUser?'':'<div style=\"font-size:9px;color:var(--ac-d);margin-top:2px\">Kies in de squad</div>'}</div>`;
}

function renderCats() {
  let h = `<div class="cp${filt==='all'?' on':''}" data-c="all">Alles</div>`;
  Object.entries(CATS).forEach(([k,v]) => {
    if (expenses.some(e => e.cat === k))
      h += `<div class="cp${filt===k?' on':''}" data-c="${k}">${v.i} ${v.l}</div>`;
  });
  const el = document.getElementById('cats');
  el.innerHTML = h;
  el.querySelectorAll('.cp').forEach(c => c.onclick = () => { filt = c.dataset.c; render(); });
}

function renderList() {
  const f = filt === 'all' ? expenses : expenses.filter(e => e.cat === filt);
  const el = document.getElementById('elist');
  if (!f.length) {
    el.innerHTML = `<div class="empty"><p>Niks hier broer.<br>Drop je eerste uitgave hierboven!</p></div>`;
    return;
  }
  el.innerHTML = [...f].reverse().map(e => {
    const c = CATS[e.cat];
    return `<div class="ei" data-id="${e.id}">
      <div class="eicon" style="background:${c.bg};color:${c.c}">${c.i}</div>
      <div class="einfo"><div class="et">${e.d}</div><div class="em">${e.dt} · ${e.split.length}p</div></div>
      <div class="ea"><div class="ev">\u20AC${e.a.toFixed(2)}</div><div class="ep">${e.payer}</div></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.ei').forEach(i => i.onclick = () => showDtl(+i.dataset.id));
}

function renderBal() {
  const bal = {};
  names().forEach(n => bal[n] = 0);
  expenses.forEach(e => {
    bal[e.payer] = (bal[e.payer] || 0) + e.a;
    const sh = e.a / e.split.length;
    e.split.forEach(p => { if (bal[p] !== undefined) bal[p] -= sh; });
  });
  payments.forEach(pm => {
    if (bal[pm.f] !== undefined) bal[pm.f] += pm.a;
    if (bal[pm.t] !== undefined) bal[pm.t] -= pm.a;
  });
  const mx = Math.max(...Object.values(bal).map(Math.abs), 1);
  document.getElementById('blist').innerHTML = names().map(n => {
    const v = bal[n] || 0;
    const cls = v >= 0 ? 'pos' : 'neg';
    const pct = Math.abs(v) / mx * 100;
    const bc = v >= 0 ? '#1D9E75' : '#E24B4A';
    return `<div class="bi">
      <div class="bav" style="background:${pcol(n)}20;color:${pcol(n)}">${ini(n)}</div>
      <div class="bn">${n}</div>
      <div class="bbar"><div class="bbf" style="width:${pct}%;background:${bc}"></div></div>
      <div class="bv ${cls}">${v>=0?'+':''}\u20AC${Math.abs(v).toFixed(2)}</div>
    </div>`;
  }).join('');
}

function renderSettle() {
  const bal = {};
  names().forEach(n => bal[n] = 0);
  expenses.forEach(e => {
    bal[e.payer] = (bal[e.payer] || 0) + e.a;
    const sh = e.a / e.split.length;
    e.split.forEach(p => { if (bal[p] !== undefined) bal[p] -= sh; });
  });
  // Apply payments to balances
  payments.forEach(pm => {
    if (bal[pm.f] !== undefined) bal[pm.f] += pm.a;
    if (bal[pm.t] !== undefined) bal[pm.t] -= pm.a;
  });

  const dbt = names().filter(n => bal[n] < -0.01).map(n => ({n, a: bal[n]})).sort((a,b) => a.a - b.a);
  const crd = names().filter(n => bal[n] > 0.01).map(n => ({n, a: bal[n]})).sort((a,b) => b.a - a.a);
  const stl = [];
  let di = 0, ci = 0;
  while (di < dbt.length && ci < crd.length) {
    const am = Math.min(-dbt[di].a, crd[ci].a);
    if (am > 0.01) stl.push({ f: dbt[di].n, t: crd[ci].n, a: am });
    dbt[di].a += am; crd[ci].a -= am;
    if (Math.abs(dbt[di].a) < 0.01) di++;
    if (Math.abs(crd[ci].a) < 0.01) ci++;
  }
  const el = document.getElementById('slist');

  // Show paid payments first as "done", then open settlements
  let html = '';

  // Open settlements first
  if (!stl.length && !payments.length) {
    el.innerHTML = `<div class="empty"><p>Iedereen is clean, wallah!</p></div>`;
    return;
  }

  html += stl.map((s, i) => {
    const toP = people.find(p => p.n === s.t);
    const hasIban = toP && toP.iban;
    const ibanBtn = hasIban
      ? `<button class="ibcopy" onclick="event.stopPropagation();copyIban('${s.t.replace(/'/g,"\\'")}')">IBAN</button>`
      : '';
    const escF = s.f.replace(/'/g,"\\'");
    const escT = s.t.replace(/'/g,"\\'");
    return `<div class="si">
      <div class="bav" style="background:${pcol(s.f)}20;color:${pcol(s.f)};width:24px;height:24px;font-size:9px">${ini(s.f)}</div>
      <span>${s.f}</span><span class="sarr">\u2192</span><span>${s.t}</span>
      <div class="bav" style="background:${pcol(s.t)}20;color:${pcol(s.t)};width:24px;height:24px;font-size:9px">${ini(s.t)}</div>
      <span class="samt">\u20AC${s.a.toFixed(2)}</span>
      <button class="pay-btn" onclick="event.stopPropagation();markPaid('${escF}','${escT}',${s.a})">Betaal</button>
      ${ibanBtn}
    </div>`;
  }).join('');

  // Paid items below
  if (payments.length) {
    html += payments.map((pm, i) =>
      `<div class="si paid-row">
        <div class="bav" style="background:${pcol(pm.f)}20;color:${pcol(pm.f)};width:24px;height:24px;font-size:9px">${ini(pm.f)}</div>
        <span>${pm.f}</span><span class="sarr">\u2192</span><span>${pm.t}</span>
        <div class="bav" style="background:${pcol(pm.t)}20;color:${pcol(pm.t)};width:24px;height:24px;font-size:9px">${ini(pm.t)}</div>
        <span class="samt">\u20AC${pm.a.toFixed(2)}</span>
        <button class="pay-btn done" onclick="event.stopPropagation();undoPay(${i})">Betaald</button>
      </div>`
    ).join('');
  }

  if (!stl.length && payments.length) {
    html = `<div class="empty"><p>Alles is betaald, nice!</p></div>` + html;
  }

  el.innerHTML = html;
}

function markPaid(from, to, amount) {
  payments.push({ f: from, t: to, a: Math.round(amount * 100) / 100, dt: new Date().toISOString().slice(0,10) });
  savePayments(); render();
  toast(from + ' heeft ' + to + ' betaald!');
}

function undoPay(idx) {
  payments.splice(idx, 1);
  savePayments(); render();
  toast('Betaling ongedaan gemaakt');
}

function renderIbans() {
  const el = document.getElementById('iban-list');
  const withIban = people.filter(p => p.iban);
  if (!withIban.length) {
    el.innerHTML = `<p style="font-size:11px;color:var(--tx2)">Nog geen IBAN's bro. Fix dat bij "De squad".</p>`;
    return;
  }
  el.innerHTML = withIban.map(p =>
    `<div class="iban-row">
      <div class="bav" style="background:${pcol(p.n)}20;color:${pcol(p.n)};width:24px;height:24px;font-size:9px">${ini(p.n)}</div>
      <span class="ibname">${p.n}</span>
      <span class="ibnum">${p.iban}</span>
      <button class="ibcopy" onclick="copyIban('${p.n.replace(/'/g,"\\'")}')">Kopieer</button>
    </div>`
  ).join('');
}

function renderPaylog() {
  const section = document.getElementById('paylog-section');
  const el = document.getElementById('paylog');
  if (!payments.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  el.innerHTML = [...payments].reverse().map((pm, ri) => {
    const idx = payments.length - 1 - ri;
    return `<div class="pl-item">
      <span class="pl-check">\u2713</span>
      <div class="pl-names">${pm.f} <span style="color:var(--ac)">\u2192</span> ${pm.t}</div>
      <span class="pl-amt">\u20AC${pm.a.toFixed(2)}</span>
      <span class="pl-date">${pm.dt || ''}</span>
    </div>`;
  }).join('');
}

function renderPeople() {
  const el = document.getElementById('ppl-list');
  el.innerHTML = people.map((p, i) => {
    const isMe = currentUser === p.n;
    return `<div class="ppl-card${isMe?' is-me':''}">
      <div class="bav" style="background:${PCOL[i%PCOL.length]}20;color:${PCOL[i%PCOL.length]};width:30px;height:30px;font-size:11px">${ini(p.n)}</div>
      <div class="pinfo"><div class="pname">${p.n}${isMe?'<span class="me-tag">jij</span>':''}</div><div class="piban">${p.iban || 'Geen IBAN bro'}</div></div>
      <button class="me-btn${isMe?' active':''}" onclick="setMe(${i})">${isMe?'Jij!':'Dit ben ik'}</button>
      <button class="ppl-edit" onclick="editPerson(${i})">Fix</button>
    </div>`;
  }).join('');
}

// ── IBAN copy ──
function setMe(idx) {
  const name = people[idx].n;
  currentUser = (currentUser === name) ? null : name;
  saveMe(); render();
  toast(currentUser ? `Hey ${currentUser}!` : 'Niemand geselecteerd');
}

function copyIban(name) {
  const p = people.find(x => x.n === name);
  if (!p || !p.iban) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(p.iban).then(() => toast('IBAN geknipt, stuur die rakker!')).catch(fallbackCopy);
  } else { fallbackCopy(); }
  function fallbackCopy() {
    const ta = document.createElement('textarea');
    ta.value = p.iban; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('IBAN geknipt, stuur die rakker!');
  }
}

// ── Modal helpers ──
function closeMo() { document.getElementById('mo').classList.remove('open'); editId = null; }
document.getElementById('mo').addEventListener('click', function(e) { if (e.target === this) closeMo(); });

// ── People management ──
function editPerson(idx) {
  const p = people[idx];
  const ms = document.getElementById('ms');
  ms.innerHTML = `<h2>Broeder bewerken<span onclick="closeMo()">Laat maar</span></h2>
    <div class="fg"><label>Naam</label><input type="text" id="ep-name" value="${p.n}"></div>
    <div class="fg"><label>IBAN (voor de transfers)</label><input type="text" id="ep-iban" value="${p.iban}" placeholder="BE00 0000 0000 0000" style="font-family:var(--mono)"></div>
    <div class="macts">
      <button class="mbtn-c" onclick="closeMo()">Nee toch</button>
      <button class="mbtn-s" onclick="savePerson(${idx})">Save</button>
    </div>`;
  document.getElementById('mo').classList.add('open');
  document.getElementById('ep-name').focus();
}

function savePerson(idx) {
  const nn = document.getElementById('ep-name').value.trim();
  const ni = document.getElementById('ep-iban').value.trim().toUpperCase();
  if (!nn) return;
  const old = people[idx].n;
  people[idx].n = nn; people[idx].iban = ni;
  if (currentUser === old) { currentUser = nn; saveMe(); }
  expenses.forEach(e => {
    if (e.payer === old) e.payer = nn;
    e.split = e.split.map(s => s === old ? nn : s);
  });
  closeMo(); saveData(); render(); toast('Gefixt!');
}

function addPerson() {
  const ms = document.getElementById('ms');
  ms.innerHTML = `<h2>Nieuwe broeder<span onclick="closeMo()">Laat maar</span></h2>
    <div class="fg"><label>Naam</label><input type="text" id="ep-name" placeholder="Naam"></div>
    <div class="fg"><label>IBAN (voor de transfers)</label><input type="text" id="ep-iban" placeholder="BE00 0000 0000 0000" style="font-family:var(--mono)"></div>
    <div class="macts">
      <button class="mbtn-c" onclick="closeMo()">Nee toch</button>
      <button class="mbtn-s" onclick="saveNewPerson()">Erbij!</button>
    </div>`;
  document.getElementById('mo').classList.add('open');
  document.getElementById('ep-name').focus();
}

function saveNewPerson() {
  const nn = document.getElementById('ep-name').value.trim();
  const ni = document.getElementById('ep-iban').value.trim().toUpperCase();
  if (!nn) return;
  people.push({ n: nn, iban: ni });
  closeMo(); saveData(); render(); toast(nn + ' zit erbij swa!');
}

document.getElementById('ppl-add').onclick = addPerson;

// ── Add / Edit expense ──
function openAdd(eid) {
  const mo = document.getElementById('mo');
  const ms = document.getElementById('ms');
  const isEdit = !!eid;
  const ex = isEdit ? expenses.find(e => e.id === eid) : null;
  editId = eid || null;

  window._addState = {
    step: 1,
    isEdit,
    eid,
    ex,
    cat: ex ? ex.cat : 'food',
    payer: ex ? ex.payer : (currentUser || names()[0]),
    split: ex ? [...ex.split] : [...names()],
    d: ex ? ex.d : '',
    a: ex ? ex.a : '',
  };
  renderStep1();
  mo.classList.add('open');
}

function renderStep1() {
  const ms = document.getElementById('ms');
  const s = window._addState;

  const catGrid = Object.entries(CATS).map(([k,v]) => {
    const on = s.cat === k;
    return `<div class="qc${on?' on':''}" data-cat="${k}"><i>${v.i}</i>${v.l}</div>`;
  }).join('');

  const payerOpts = names().map(n =>
    `<option value="${n}"${s.payer === n ? ' selected' : ''}>${n}</option>`
  ).join('');

  ms.innerHTML = `<h2>${s.isEdit ? 'Aanpassen' : 'Nieuwe uitgave'}<span onclick="closeMo()">Laat maar</span></h2>
    <div class="steps"><div class="step-dot on"></div><div class="step-dot"></div></div>
    <div class="fg"><label>Waarvoor?</label><input type="text" id="mi-d" placeholder="bv. Pasta aan het meer" value="${s.d}"></div>
    <div class="fg-row">
      <div class="fg"><label>Hoeveel schade?</label><input type="number" id="mi-a" placeholder="0.00" step="0.01" min="0" value="${s.a}" inputmode="decimal"></div>
      <div class="fg"><label>Wie heeft gelapt?</label><select id="mi-p">${payerOpts}</select></div>
    </div>
    <div class="fg"><label>Categorie</label><div class="qcat" id="mi-cat">${catGrid}</div></div>
    <div class="macts">
      <button class="mbtn-c" onclick="closeMo()">Nee toch</button>
      <button class="mbtn-s" onclick="goStep2()">Volgende</button>
    </div>`;

  ms.querySelectorAll('.qc').forEach(c => c.onclick = () => {
    ms.querySelectorAll('.qc').forEach(x => {
      x.classList.remove('on');
      x.style.background = '';
      x.style.border = '';
      x.style.color = '';
    });
    c.classList.add('on');
    window._addState.cat = c.dataset.cat;
  });

  setTimeout(() => document.getElementById('mi-d').focus(), 150);
}

function goStep2() {
  const s = window._addState;
  const d = document.getElementById('mi-d').value.trim();
  const a = parseFloat(document.getElementById('mi-a').value);
  if (!d || isNaN(a) || a <= 0) {
    toast('Vul wat in broer!');
    return;
  }
  s.d = d;
  s.a = a;
  s.payer = document.getElementById('mi-p').value;
  const catEl = document.querySelector('#mi-cat .qc.on');
  if (catEl) s.cat = catEl.dataset.cat;
  renderStep2();
}

function renderStep2() {
  const ms = document.getElementById('ms');
  const s = window._addState;

  const splitChips = names().map(n => {
    const on = s.split.includes(n);
    return `<div class="sp${on?' on':''}" data-p="${n}"><span class="sp-check">\u2713</span><div class="bav" style="background:${pcol(n)}20;color:${pcol(n)};width:24px;height:24px;font-size:9px">${ini(n)}</div>${n}</div>`;
  }).join('');

  ms.innerHTML = `<h2>${s.isEdit ? 'Aanpassen' : 'Nieuwe uitgave'}<span onclick="closeMo()">Laat maar</span></h2>
    <div class="steps"><div class="step-dot on"></div><div class="step-dot on"></div></div>
    <div style="background:var(--bg2);border-radius:var(--radius);padding:8px 10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px">
      <span style="font-weight:500">${s.d}</span><span style="font-weight:600">\u20AC${s.a.toFixed(2)}</span>
    </div>
    <div class="fg"><label>Splitten met <span class="allbtn" id="tog-all">iedereen aan/uit</span></label><div class="splitrow" id="mi-sp">${splitChips}</div></div>
    <div class="macts">
      ${s.isEdit ? `<button class="mbtn-c mbtn-del" onclick="delExp(${s.eid})">Weg ermee</button>` : ''}
      <button class="mbtn-c" onclick="renderStep1()">Terug</button>
      <button class="mbtn-s" onclick="saveExp()">Save</button>
    </div>`;

  ms.querySelectorAll('.sp').forEach(c => c.onclick = () => {
    c.classList.toggle('on');
    const p = c.dataset.p;
    if (c.classList.contains('on')) { if (!s.split.includes(p)) s.split.push(p); }
    else { s.split = s.split.filter(x => x !== p); }
  });
  document.getElementById('tog-all').onclick = () => {
    const all = ms.querySelectorAll('.sp');
    const allOn = [...all].every(c => c.classList.contains('on'));
    all.forEach(c => allOn ? c.classList.remove('on') : c.classList.add('on'));
    s.split = allOn ? [] : [...names()];
  };
}

function saveExp() {
  const s = window._addState;
  const split = [...document.querySelectorAll('#mi-sp .sp.on')].map(c => c.dataset.p);
  if (!split.length) { toast('Kies minstens 1 broeder!'); return; }

  if (s.isEdit) {
    const e = expenses.find(x => x.id === s.eid);
    e.d = s.d; e.a = s.a; e.cat = s.cat; e.payer = s.payer; e.split = split;
  } else {
    const dt = new Date().toISOString().slice(0, 10);
    expenses.push({ id: nid++, d: s.d, a: s.a, cat: s.cat, payer: s.payer, split, dt });
  }
  closeMo(); saveData(); render();
  toast(s.isEdit ? 'Updated swa!' : 'Erin gedropt!');
}

function delExp(id) {
  expenses = expenses.filter(e => e.id !== id);
  closeMo();
  document.getElementById('dtl').classList.remove('open');
  saveData(); render(); toast('Weg is ie!');
}

// ── Detail view ──
function showDtl(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  const c = CATS[e.cat];
  const sh = (e.a / e.split.length).toFixed(2);

  const dtl = document.getElementById('dtl');
  dtl.innerHTML = `
    <div class="dbk" onclick="document.getElementById('dtl').classList.remove('open')">\u2190 Terug bro</div>
    <div class="dh">
      <div class="eicon" style="background:${c.bg};color:${c.c};width:40px;height:40px;font-size:18px;margin-bottom:8px;border-radius:10px;display:flex;align-items:center;justify-content:center">${c.i}</div>
      <h3>${e.d}</h3>
      <p style="font-size:12px;color:var(--tx2);margin-top:3px">${c.l} · ${e.dt}</p>
    </div>
    <div class="dr"><span class="dl">Schade</span><span style="font-weight:600">\u20AC${e.a.toFixed(2)}</span></div>
    <div class="dr"><span class="dl">Gelapt door</span><span>${e.payer}</span></div>
    <div class="dr"><span class="dl">Gesplit met</span><span>${e.split.length} broeders</span></div>
    <div class="dr"><span class="dl">Per hoofd</span><span>\u20AC${sh}</span></div>
    <div style="margin-top:10px">
      <p style="font-size:11px;color:var(--tx2);margin-bottom:6px">De squad</p>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${e.split.map(p => `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:14px;background:var(--bg2)">
          <span style="width:18px;height:18px;border-radius:50%;background:${pcol(p)}20;color:${pcol(p)};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:600">${ini(p)}</span>${p}
        </span>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:1.5rem">
      <button style="flex:1;padding:12px;border-radius:var(--radius);background:none;border:1.5px solid #E24B4A;color:#E24B4A;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font)" onclick="delExp(${e.id})">Weg ermee</button>
      <button style="flex:1;padding:12px;border-radius:var(--radius);background:var(--ac);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font)" onclick="document.getElementById('dtl').classList.remove('open');openAdd(${e.id})">Aanpassen</button>
    </div>`;
  dtl.classList.add('open');
}

// ── Init ──
document.getElementById('add-strip').onclick = () => openAdd();
document.getElementById('ppl-add').onclick = addPerson;
// Initial render happens in Firebase once() callback
</script>
